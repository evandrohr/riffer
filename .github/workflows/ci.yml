name: ci

on:
  - pull_request

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rake standard

  test:
    runs-on: ubuntu-latest
    name: test ${{ matrix.ruby }}

    strategy:
      matrix:
        ruby:
          - "3.2"
          - "3.3"
          - "3.4"

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test

  rbs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Generate RBS files
        run: bundle exec rake rbs:generate
      - name: Check for RBS drift
        run: git diff --exit-code sig/generated/
      - name: Run Steep type check
        run: bundle exec steep check

  voice_quality:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Generate voice RubyCritic report
        run: bundle exec rake quality:voice:rubycritic
      - name: Summarize voice RubyCritic ratings
        run: bundle exec rake quality:voice:gate
      - name: Upload voice RubyCritic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rubycritic-voice-report
          path: tmp/rubycritic-voice/
